
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4A90D9">
<title>护理责任组长竞聘 - 刷题库</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234A90D9' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='45' font-weight='bold'>护</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom)}
.container{max-width:600px;margin:0 auto;padding:12px}
.header{background:linear-gradient(135deg,#4A90D9,#357ABD);color:white;padding:16px 20px;text-align:center;font-size:18px;font-weight:600;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.header .sub{font-size:12px;opacity:.8;margin-top:2px}
.card{background:white;border-radius:14px;padding:20px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;margin-bottom:12px;color:#1a1a1a}
.btn{display:inline-block;padding:10px 24px;border-radius:10px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:all .2s;text-align:center;user-select:none}
.btn:active{transform:scale(.96);opacity:.85}
.btn-primary{background:#4A90D9;color:white;width:100%}
.btn-outline{background:white;color:#4A90D9;border:1.5px solid #4A90D9}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:#e74c3c;color:white}
.tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:12px;margin:2px 4px}
.tag-chapter{background:#e8f0fe;color:#4A90D9;cursor:pointer;border:1.5px solid transparent}
.tag-chapter.active{background:#4A90D9;color:white;border-color:#4A90D9}
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin:12px 0;overflow:hidden}
.progress-fill{height:100%;background:#4A90D9;border-radius:2px;transition:width .3s}
.option{display:flex;align-items:flex-start;padding:14px 16px;margin:8px 0;border-radius:10px;border:2px solid #e8e8e8;cursor:pointer;transition:all .2s;font-size:15px;line-height:1.5}
.option:active{background:#f5f7fa}
.option.selected{border-color:#4A90D9;background:#e8f0fe}
.option.correct{border-color:#27ae60;background:#eafaf1}
.option.wrong{border-color:#e74c3c;background:#fdedec}
.option .opt-label{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;margin-right:12px;flex-shrink:0;border:2px solid #ccc;color:#666}
.option.selected .opt-label{background:#4A90D9;border-color:#4A90D9;color:white}
.option.correct .opt-label{background:#27ae60;border-color:#27ae60;color:white}
.option.wrong .opt-label{background:#e74c3c;border-color:#e74c3c;color:white}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-type{font-size:12px;padding:3px 8px;border-radius:4px;font-weight:500}
.q-type.judge{background:#fff3e0;color:#e67e22}
.q-type.single{background:#e8f0fe;color:#4A90D9}
.q-type.multi{background:#f3e5f5;color:#8e44ad}
.q-num{font-size:13px;color:#999}
.star-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;transition:transform .2s}
.star-btn:active{transform:scale(1.3)}
.star-btn.starred{color:#f39c12}
.flex-row{display:flex;gap:8px;align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mb-12{margin-bottom:12px}
.text-center{text-align:center}
.text-sm{font-size:13px;color:#666}
.text-lg{font-size:20px;font-weight:700}
.text-green{color:#27ae60}
.text-red{color:#e74c3c}
.text-orange{color:#f39c12}
.slider-container{display:flex;align-items:center;gap:12px}
input[type=range]{flex:1;height:6px;-webkit-appearance:none;background:#e0e0e0;border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#4A90D9;cursor:pointer}
.score-circle{width:120px;height:120px;border-radius:50%;border:6px solid #e0e0e0;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:36px;font-weight:700}
.review-item{padding:12px;margin:8px 0;border-radius:8px;background:#f8f9fa;cursor:pointer;border-left:4px solid #ccc}
.review-item.correct{border-left-color:#27ae60}
.review-item.wrong{border-left-color:#e74c3c}
.review-expand{margin-top:8px;padding-top:8px;border-top:1px solid #eee;display:none}
.review-item.open .review-expand{display:block}
.section-title{font-size:16px;font-weight:600;padding:8px 0;margin:16px 0 8px;border-bottom:2px solid #4A90D9;display:flex;justify-content:space-between}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.nav-tabs{display:flex;background:white;border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-tab{flex:1;padding:14px 8px;text-align:center;font-size:14px;font-weight:500;color:#666;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.nav-tab.active{color:#4A90D9;border-bottom-color:#4A90D9;background:#f8faff}
input[type=number]{width:60px;padding:8px;border-radius:8px;border:1.5px solid #ddd;font-size:15px;text-align:center}
.chapter-grid{display:flex;flex-wrap:wrap;gap:6px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <div>护理责任组长竞聘 · 刷题库</div>
  <div class="sub">共1126题 | 判断345 · 单选494 · 多选287 | 含692题解析</div>
</div>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>
<script src="questions_data.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
