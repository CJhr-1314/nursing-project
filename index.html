
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3B82BF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15181D" media="(prefers-color-scheme: dark)">
<title>护理责任组长竞聘 - 刷题库</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%234A90D9' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' fill='white' font-size='45' font-weight='bold'>护</text></svg>">
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --color-primary: #3B82BF;
  --color-primary-dark: #2C5F8A;
  --color-primary-light: #EBF4FF;
  --color-surface: #FFFFFF;
  --color-bg: #F3F5F7;
  --color-text: #1E293B;
  --color-text-secondary: #64748B;
  --color-text-muted: #94A3B8;
  --color-border: #E2E8F0;
  --color-border-light: #F1F5F9;
  --color-success: #22A06B;
  --color-success-bg: #EDFBF4;
  --color-warning: #E2A03F;
  --color-danger: #E5484D;
  --color-danger-bg: #FEF2F2;
  --color-exam: #C0392B;
  --color-exam-bg: #FEF2F2;
  --color-star: #F59E0B;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10);
  --shadow-focus: 0 0 0 3px rgba(59,130,191,0.25);
  --font-xs: 11px;
  --font-sm: 13px;
  --font-base: 16px;
  --font-lg: 20px;
  --font-xl: 28px;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
}

/* ===== DARK MODE ===== */
@media (prefers-color-scheme: dark) {
  :root {
    --color-primary: #5BA0D9;
    --color-primary-dark: #3B82BF;
    --color-primary-light: #1E2A3A;
    --color-surface: #1E2228;
    --color-bg: #15181D;
    --color-text: #E2E8F0;
    --color-text-secondary: #94A3B8;
    --color-text-muted: #64748B;
    --color-border: #2D3239;
    --color-border-light: #22262C;
    --color-success-bg: #1A2E24;
    --color-danger-bg: #2E1A1A;
    --color-exam-bg: #2E1A1A;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    --shadow-focus: 0 0 0 3px rgba(91,160,217,0.3);
  }
}

/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--color-bg);
  color:var(--color-text);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:env(safe-area-inset-bottom);
  line-height:1.6;
}

/* ===== FOCUS ===== */
*:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ===== LAYOUT ===== */
.container{max-width:600px;margin:0 auto;padding:var(--space-md)}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,var(--color-primary),var(--color-primary-dark));
  color:white;padding:var(--space-md) 20px;text-align:center;
  font-size:18px;font-weight:600;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
  letter-spacing:0.02em;
}
.header .sub{font-size:var(--font-xs);opacity:.75;margin-top:2px;font-weight:400}

/* ===== CARD ===== */
.card{
  background:var(--color-surface);
  border-radius:var(--radius-md);
  padding:20px;
  margin-bottom:var(--space-md);
  box-shadow:var(--shadow-sm);
  border:1px solid var(--color-border-light);
  transition:box-shadow var(--transition-normal);
}
.card-title{
  font-size:var(--font-base);
  font-weight:600;
  margin-bottom:var(--space-md);
  color:var(--color-text);
  display:flex;
  align-items:center;
  gap:var(--space-sm);
}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:12px 24px;border-radius:var(--radius-sm);font-size:var(--font-base);
  font-weight:600;border:none;cursor:pointer;transition:all var(--transition-fast);
  text-align:center;user-select:none;gap:6px;letter-spacing:0.01em;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--color-primary);color:white;width:100%;height:52px}
.btn-primary:hover{background:var(--color-primary-dark);box-shadow:var(--shadow-md)}
.btn-outline{background:transparent;color:var(--color-primary);border:2px solid var(--color-primary)}
.btn-outline:hover{background:var(--color-primary-light)}
.btn-sm{padding:7px 14px;font-size:var(--font-sm);border-radius:var(--radius-sm)}
.btn-danger{background:var(--color-danger);color:white}
.btn-danger:hover{opacity:.9}

/* ===== BADGE & TAG ===== */
.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:var(--radius-sm);font-size:var(--font-xs);margin:2px var(--space-xs);font-weight:600;gap:4px}
.tag-chapter{background:var(--color-primary-light);color:var(--color-primary);cursor:pointer;border:1.5px solid transparent;transition:all var(--transition-fast)}
.tag-chapter:hover{border-color:var(--color-primary)}
.tag-chapter.active{background:var(--color-primary);color:white;border-color:var(--color-primary);box-shadow:var(--shadow-sm);transform:scale(1.03)}

/* ===== PROGRESS ===== */
.progress-bar{height:6px;background:var(--color-border);border-radius:var(--radius-full);margin:var(--space-sm) 0 var(--space-md);overflow:hidden}
.progress-fill{height:100%;background:var(--color-primary);border-radius:var(--radius-full);transition:width .4s cubic-bezier(0.4, 0, 0.2, 1)}

/* ===== OPTIONS (答题选项) ===== */
.option{
  display:flex;align-items:flex-start;padding:var(--space-md);
  margin:var(--space-sm) 0;border-radius:var(--radius-sm);
  border:2px solid var(--color-border);cursor:pointer;
  transition:all var(--transition-fast);font-size:var(--font-base);line-height:1.6;
  background:var(--color-surface);
}
.option:active{background:var(--color-primary-light)}
.option.selected{
  border-color:var(--color-primary);
  background:var(--color-primary-light);
  border-left:4px solid var(--color-primary);
  padding-left:14px;
}
.option.correct{
  border-color:var(--color-success);
  background:var(--color-success-bg);
  border-left:4px solid var(--color-success);
  padding-left:14px;
}
.option.wrong{
  border-color:var(--color-danger);
  background:var(--color-danger-bg);
  border-left:4px solid var(--color-danger);
  padding-left:14px;
}
.option .opt-label{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;margin-right:14px;flex-shrink:0;
  border:2px solid var(--color-text-muted);color:var(--color-text-secondary);
  transition:all var(--transition-fast);
}
.option.selected .opt-label{background:var(--color-primary);border-color:var(--color-primary);color:white}
.option.correct .opt-label{background:var(--color-success);border-color:var(--color-success);color:white}
.option.wrong .opt-label{background:var(--color-danger);border-color:var(--color-danger);color:white}

/* ===== QUESTION META ===== */
.q-meta{display:flex;align-items:center;gap:var(--space-sm);margin-bottom:var(--space-md);flex-wrap:wrap}
.q-type{font-size:var(--font-xs);padding:4px 10px;border-radius:var(--radius-sm);font-weight:600}
.q-type.judge{background:#FFF7ED;color:#C2410C}
.q-type.single{background:var(--color-primary-light);color:var(--color-primary)}
.q-type.multi{background:#F3E8FF;color:#7C3AED}
.q-num{font-size:var(--font-sm);color:var(--color-text-muted)}

/* ===== STAR ===== */
.star-btn{background:none;border:none;font-size:24px;cursor:pointer;padding:0 4px;line-height:1;transition:transform var(--transition-fast);color:var(--color-text-muted)}
.star-btn:active{transform:scale(1.3)}
.star-btn.starred{color:var(--color-star)}

/* ===== UTILITIES ===== */
.flex-row{display:flex;gap:var(--space-sm);align-items:center}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mt-12{margin-top:12px}
.mt-16{margin-top:var(--space-md)}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:var(--space-md)}
.text-center{text-align:center}
.text-sm{font-size:var(--font-sm);color:var(--color-text-secondary)}
.text-lg{font-size:var(--font-lg);font-weight:700}
.text-green{color:var(--color-success)}
.text-red{color:var(--color-danger)}
.text-orange{color:var(--color-warning)}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(90px, 1fr));gap:var(--space-sm)}

/* ===== SLIDER ===== */
.slider-container{display:flex;align-items:center;gap:12px}
input[type=range]{
  flex:1;height:8px;-webkit-appearance:none;
  background:var(--color-border);border-radius:var(--radius-full);outline:none
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:26px;height:26px;border-radius:50%;
  background:var(--color-primary);cursor:pointer;
  box-shadow:var(--shadow-sm);transition:transform var(--transition-fast);
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.1)}
input[type=number]{
  width:62px;padding:8px var(--space-sm);border-radius:var(--radius-sm);
  border:2px solid var(--color-border);font-size:var(--font-base);text-align:center;
  background:var(--color-surface);color:var(--color-text);
  transition:border-color var(--transition-fast);
}
input[type=number]:focus{border-color:var(--color-primary);box-shadow:var(--shadow-focus)}

/* ===== SCORE CIRCLE ===== */
.score-circle{
  width:130px;height:130px;border-radius:50%;
  border:6px solid var(--color-border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;font-size:38px;font-weight:800;
  background:var(--color-surface);
  transition:border-color .6s ease;
}

/* ===== REVIEW ===== */
.review-item{
  padding:14px var(--space-md);margin:var(--space-sm) 0;
  border-radius:var(--radius-sm);background:var(--color-surface);
  cursor:pointer;border-left:4px solid var(--color-border);
  box-shadow:var(--shadow-sm);
  transition:all var(--transition-fast);
}
.review-item:hover{box-shadow:var(--shadow-md)}
.review-item.correct{border-left-color:var(--color-success);background:var(--color-success-bg)}
.review-item.wrong{border-left-color:var(--color-danger);background:var(--color-danger-bg)}
.review-expand{margin-top:var(--space-sm);padding-top:var(--space-sm);border-top:1px solid var(--color-border);display:none}
.review-item.open .review-expand{display:block}
.section-title{
  font-size:var(--font-base);font-weight:700;padding:var(--space-sm) 0;
  margin:var(--space-lg) 0 var(--space-sm);
  border-bottom:2px solid var(--color-primary);display:flex;justify-content:space-between;
  color:var(--color-text);
}
.empty-state{text-align:center;padding:48px 20px;color:var(--color-text-muted);font-size:var(--font-sm)}

/* ===== NAV TABS ===== */
.nav-tabs{
  display:flex;background:var(--color-surface);border-radius:var(--radius-md);
  overflow:hidden;margin-bottom:var(--space-md);
  box-shadow:var(--shadow-sm);border:1px solid var(--color-border-light);
}
.nav-tab{
  flex:1;padding:14px 8px;text-align:center;font-size:14px;font-weight:600;
  color:var(--color-text-secondary);cursor:pointer;
  border-bottom:3px solid transparent;transition:all var(--transition-fast);
}
.nav-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);background:var(--color-primary-light)}

/* ===== EXAM CARD (真题) ===== */
.exam-card{
  background:var(--color-surface);border-radius:var(--radius-md);
  padding:var(--space-md);margin:var(--space-md) 0;
  border:2px solid var(--color-border);cursor:pointer;
  transition:all var(--transition-fast);
}
.exam-card:hover,.exam-card:active{border-color:var(--color-exam);box-shadow:0 4px 16px rgba(192,57,43,0.08)}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--color-text);color:var(--color-surface);
  padding:12px 24px;border-radius:var(--radius-full);font-size:14px;
  z-index:999;opacity:0;transition:all var(--transition-normal);
  pointer-events:none;font-weight:500;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== QUIZ BOTTOM BAR ===== */
.quiz-bottom-bar{
  position:sticky;bottom:0;z-index:50;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:var(--space-sm) var(--space-md);
  padding-bottom:max(var(--space-sm), env(safe-area-inset-bottom));
  border-top:1px solid var(--color-border-light);
  margin:0 calc(-1 * var(--space-md));
}

/* ===== QUIZ TOP BAR ===== */
.quiz-top-bar{
  position:sticky;top:57px;z-index:50;
  background:var(--color-surface);
  padding:var(--space-sm) 0;
  border-bottom:1px solid var(--color-border-light);
  margin-bottom:var(--space-md);
}

/* ===== QUESTION NUMBER GRID ===== */
.q-nav-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(34px, 1fr));
  gap:6px;
}
.q-nav-dot{
  width:34px;height:34px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:var(--font-xs);cursor:pointer;font-weight:600;
  transition:all var(--transition-fast);
}
.q-nav-dot:hover{transform:scale(1.1)}

/* ===== DARK MODE OVERRIDES ===== */
@media (prefers-color-scheme: dark) {
  .quiz-bottom-bar{background:rgba(30,34,40,0.88)}
  .header{background:linear-gradient(135deg,#2C5F8A,#1E3A5F)}
  input[type=number]{background:var(--color-surface);color:var(--color-text)}
}
</style>
</head>
<body>
<div class="header">
  <div>护理责任组长竞聘 · 刷题库</div>
  <div class="sub">共1473题 | 判断517 · 单选611 · 多选345 | 含1039题解析</div>
</div>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>
<script src="questions_data.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="app_v2.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
